replicaCount: 1

image:
  repository: grove-kc
  tag: latest
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

containerPort: 8080

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: grove-kc.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

env:
  CONTACT_FROM_EMAIL: "contact@grovekcmo.com"
  CONTACT_TO_EMAIL: ""
  CONTACT_FROM_NAME: "The Grove KC Website"
  CONTACT_LOG_PATH: "/tmp/grove-contact-messages.jsonl"
  CLIENT_PORTAL_URL: ""
  GALLERY_MANIFEST_URL: ""
  GALLERY_IMAGE_BASE_URL: ""

secretEnv:
  CLOUDFLARE_ACCOUNT_ID: ""
  CLOUDFLARE_API_TOKEN: ""

existingSecret: ""

podAnnotations: {}
podLabels: {}

resources: {}

galleryVolume:
  enabled: false
  existingClaim: ""
  hostPath: ""
  hostPathType: Directory
  mountPath: "/data/gallery"
  mediaPath: "/data/gallery"

galleryManifestConfigMap:
  enabled: false
  existingConfigMap: ""
  mountPath: "/config/gallery-manifest.json"
  items: []

nodeSelector: {}

tolerations: []

affinity: {}
